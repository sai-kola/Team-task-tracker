version: "3.9"

services:
  app:
    build: .

    container_name:
      task-tracker-api

    ports:
      - "5000:5000"

    depends_on:
      - mongodb
      - redis

    environment:
      PORT: 5000
      NODE_ENV: development

      MONGO_URI: mongodb://mongodb:27017/team-task-tracker

      REDIS_URL: redis://redis:6379

      JWT_ACCESS_SECRET: my_access_secret

      JWT_REFRESH_SECRET: my_refresh_secret

      ACCESS_TOKEN_EXPIRE: 15m

      REFRESH_TOKEN_EXPIRE: 7d

    volumes:
      - .:/app
      - /app/node_modules

    restart: always

  mongodb:
    image: mongo:latest

    container_name:
      mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest

    container_name:
      redis-server

    ports:
      - "6379:6379"

    restart: always

volumes:
  mongodb_data: